<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Design Solutions | Manjeet</title>
    
    <!-- Sahi Font Link -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Image jaisa exact Dark Green Glow background */
            background-color: #0b0e14 !important;
            background-image: 
                radial-gradient(at 50% 0%, rgba(0, 255, 136, 0.2) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(0, 255, 136, 0.15) 0px, transparent 50%) !important;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white; 
            min-height: 100vh;
        }

        header {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-section img {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        .logo-section span { font-weight: 800; font-size: 22px; }

        .container { max-width: 800px; margin: auto; padding: 50px 20px; text-align: center; }
        
        h1 { 
            color: #00ff88; 
            font-size: 2.5rem; 
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            margin-bottom: 30px;
        }
        
        .project-image-box {
            width: 100%;
            height: 380px;
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #161b22;
        }
        .project-image-box img { width: 100%; height: 100%; object-fit: cover; }

        .content-info { 
            text-align: left; 
            background: rgba(255, 255, 255, 0.03); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .content-info h2 { font-size: 1.5rem; margin-bottom: 15px; }
        .content-info p { color: #94a3b8; margin-bottom: 20px; }
        
        ul { list-style: none; }
        li { color: #00ff88; margin-bottom: 10px; font-weight: 600; }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 35px;
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
        }
        .back-btn:hover { background: #00ff88; color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <img src="images/sel.png" alt="Manjeet">
        <span>Official<span style="color: #00ff88;">Manjeet</span></span>
    </div>
</header>

<div class="container">
    <h1>Web Design Showcase</h1>
    
    <div class="project-image-box">
        <img src="https://images.unsplash.com" alt="Work Sample">
    </div>

    <div class="content-info">
        <h2>Why Choose Our Web Design?</h2>
        <p>हम आपके बिज़नेस के लिए ऐसी वेबसाइट बनाते हैं जो न केवल दिखने में अच्छी हो, बल्कि गूगल पर रैंक भी करे।</p>
        <ul>
            <li>✅ 100% Mobile Responsive</li>
            <li>✅ Ultra Fast Loading Speed</li>
            <li>✅ SEO Optimized Layout</li>
        </ul>
    </div>

    <a href="card3.html" class="back-btn">Back to Services</a>
</div>

</body>
</html>
