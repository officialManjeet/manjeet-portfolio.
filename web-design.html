<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Solutions | Official Manjeet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        /* --- Premium Professional Background --- */
        body {
            margin: 0; padding: 0;
            background: #050a0f; 
            background-image: radial-gradient(circle at 50% 50%, #0a1118 0%, #050a0f 100%);
            font-family: 'Poppins', sans-serif;
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-box img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #00ff88; }

        #lang-btn {
            background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88;
            padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: 700;
        }

        .container { width: 100%; padding-top: 40px; text-align: center; }

        h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; color: #00ff88; margin-bottom: 10px; }
        .tagline { font-size: 1.1rem; color: #aaa; margin-bottom: 30px; }

        /* --- FULL SCREEN SLIDER (NO BOX) --- */
        .slider-wrapper {
            position: relative;
            width: 100vw; /* Poori screen ki chaudai */
            height: 500px; /* Aapke hisab se height set ki hai */
            margin: auto;
            overflow: hidden;
        }

        .slider-track {
            display: flex;
            width: 500%; /* 5 pages ke liye */
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide {
            width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Responsive Mockup images */
        .mockup-img {
            width: 90%;
            max-width: 1200px;
            height: 80%;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #111; /* Agar image load na ho to black dikhega */
        }

        .slide-info {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #00ff88;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- TRANSPARENT NAVIGATION BUTTONS --- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            color: rgba(0, 255, 136, 0.4);
            border: none;
            font-size: 80px; /* Bade symbols */
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            font-family: serif;
        }

        .nav-btn:hover { color: #00ff88; scale: 1.1; }
        .nav-btn:disabled { color: rgba(255, 255, 255, 0.1); cursor: not-allowed; }

        .prev { left: 30px; }
        .next { right: 30px; }

        /* --- Actions --- */
        .btn-quote {
            display: inline-block; padding: 18px 60px; background: #00ff88;
            color: #000; text-decoration: none; font-weight: 800; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3); transition: 0.4s; margin-top: 40px;
        }

        .btn-back { display: inline-block; margin-top: 30px; color: #666; text-decoration: none; font-weight: 600; padding: 10px 20px; }
        .btn-back:hover { color: #00ff88; }

        @media (max-width: 768px) {
            .slider-wrapper { height: 350px; }
            .nav-btn { font-size: 50px; }
            .prev { left: 10px; } .next { right: 10px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-box">
        <img src="images/sel.png" alt="Logo">
        <span>Official<span style="color: #00ff88;">Manjeet</span></span>
    </a>
    <button id="lang-btn" onclick="toggleLang()">English</button>
</header>

<div class="container">
    <h1 id="main-title">प्रीमियम वेबसाइट ओवरव्यू</h1>
    <p class="tagline" id="main-tagline">अपने बिज़नेस को <span>ऑनलाइन</span> लाएं और कहीं से भी <span>हैंडल</span> करें।</p>

    <div class="slider-wrapper">
        <!-- Transparent < > Symbols -->
        <button class="nav-btn prev" id="prevBtn" onclick="moveSlide(-1)">&#10094;</button>
        <button class="nav-btn next" id="nextBtn" onclick="moveSlide(1)">&#10095;</button>

        <div class="slider-track" id="track">
            <!-- Slide 1 -->
            <div class="slide">
                <img src="https://picsum.photos" class="mockup-img" alt="Template 1">
                <div class="slide-info" id="c1">1. Home Page & Business Overview</div>
            </div>
            <!-- Slide 2 -->
            <div class="slide">
                <img src="https://picsum.photos" class="mockup-img" alt="Template 2">
                <div class="slide-info" id="c2">2. Our Services & Package Details</div>
            </div>
            <!-- Slide 3 -->
            <div class="slide">
                <img src="https://picsum.photos" class="mockup-img" alt="Template 3">
                <div class="slide-info" id="c3">3. Work Portfolio & Gallery</div>
            </div>
            <!-- Slide 4 -->
            <div class="slide">
                <img src="https://picsum.photos" class="mockup-img" alt="Template 4">
                <div class="slide-info" id="c4">4. Contact Us & Enquiry Form</div>
            </div>
            <!-- Slide 5 -->
            <div class="slide">
                <img src="https://picsum.photos" class="mockup-img" alt="Template 5">
                <div class="slide-info" id="c5">5. Business Dashboard & Analytics</div>
            </div>
        </div>
    </div>

    <a href="https://wa.me" class="btn-quote" id="quote-btn">Request Quote Now</a>
    
    <div class="back-nav">
        <a href="index.html" class="btn-back" id="back-btn">← BACK TO HOME</a>
    </div>
</div>

<script>
    let current = 0;
    const total = 5;
    const track = document.getElementById('track');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function moveSlide(dir) {
        current += dir;

        // Logic: Agar last pe pahunch gaya to aage nahi jayega
        if (current >= total - 1) {
            current = total - 1;
            nextBtn.disabled = true; // Button disable ho jayega
        } else {
            nextBtn.disabled = false;
        }

        if (current <= 0) {
            current = 0;
            prevBtn.disabled = true;
        } else {
            prevBtn.disabled = false;
        }

        track.style.transform = `translateX(-${current * 100}vw)`;
    }

    // Initial button state check
    moveSlide(0);

    // Language Toggle
    let lang = 'hi';
    const ui = {
        hi: {
            title: "प्रीमियम वेबसाइट ओवरव्यू",
            tagline: "अपने बिज़नेस को <span>ऑनलाइन</span> लाएं और कहीं से भी <span>हैंडल</span> करें।",
            c1: "1. मुख्य पृष्ठ और बिज़नेस ओवरव्यू",
            c2: "2. हमारी सेवाएं और पैकेज विवरण",
            c3: "3. वर्क पोर्टफोलियो और गैलरी",
            c4: "4. संपर्क फ़ॉर्म और पूछताछ",
            c5: "5. बिज़नेस डैशबोर्ड और एनालिटिक्स",
            btn: "अभी रेट पूछें", back: "← होम पर वापस जाएं", langBtn: "English"
        },
        en: {
            title: "Premium Website Overview",
            tagline: "Bring your business <span>Online</span> and <span>Handle</span> it easily from anywhere.",
            c1: "1. Home Page & Business Overview",
            c2: "2. Our Services & Package Details",
            c3: "3. Work Portfolio & Gallery",
            c4: "4. Contact Us & Enquiry Form",
            c5: "5. Business Dashboard & Analytics",
            btn: "Request Quote Now", back: "← Back to Home", langBtn: "Hindi"
        }
    };

    function toggleLang() {
        lang = lang === 'hi' ? 'en' : 'hi';
        const d = ui[lang];
        document.getElementById('main-title').innerText = d.title;
        document.getElementById('main-tagline').innerHTML = d.tagline;
        document.getElementById('c1').innerText = d.c1;
        document.getElementById('c2').innerText = d.c2;
        document.getElementById('c3').innerText = d.c3;
        document.getElementById('c4').innerText = d.c4;
        document.getElementById('c5').innerText = d.c5;
        document.getElementById('quote-btn').innerText = d.btn;
        document.getElementById('back-btn').innerText = d.back;
        document.getElementById('lang-btn').innerText = d.langBtn;
    }
</script>
</body>
</html>
