<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Solutions | Official Manjeet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        /* --- General Styles --- */
        body {
            margin: 0; padding: 0;
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
            color: #333;
            min-height: 100vh; overflow-x: hidden;
        }

        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            background: #ffffff; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #333; }
        .logo-box img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #00ff88; }
        .logo-box span { font-weight: 800; text-transform: uppercase; font-size: 1rem; }

        #lang-btn {
            background: #00ff88; color: #000; border: none;
            padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: 700;
        }

        .container { width: 100%; padding-top: 30px; text-align: center; }
        h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; color: #00bd65; margin-bottom: 10px; }
        .tagline { font-size: 1.1rem; color: #666; margin-bottom: 30px; }

        /* --- FINAL SLIDER SYSTEM --- */
        .slider-outer {
            position: relative; 
            width: 95%; 
            max-width: 1200px; 
            margin: auto;
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            background: #f0f0f0;
            height: 550px; /* Slider Height */
        }

        .slider-track { 
            display: flex; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            height: 100%; 
        }

        .slide { 
            min-width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .mockup-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: 0.5s;
        }

        .mockup-img:hover {
            object-position: bottom; /* Hover par auto-scroll effect */
        }

        /* Nav Buttons < > Side Positioning */
        .nav-btn {
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.85); 
            color: #00bd65;
            border: none; 
            font-size: 30px; 
            cursor: pointer; 
            z-index: 100;
            width: 55px; 
            height: 55px; 
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .prev { left: 20px; } 
        .next { right: 20px; }

        .nav-btn:hover { background: #00bd65; color: #fff; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- FEATURES LIST --- */
        .features-section { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .feature-item { background: #f9f9f9; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #eee; text-align: left; }
        .feature-item i { color: #00bd65; font-size: 1.2rem; }

        .btn-quote {
            display: inline-block; padding: 18px 60px; background: #00ff88;
            color: #000; text-decoration: none; font-weight: 800; border-radius: 50px;
            margin-top: 20px; text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .slider-outer { height: 350px; }
            .nav-btn { width: 40px; height: 40px; font-size: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://officialmanjeet.github.io" alt="Logo">
        <span>Official<span style="color: #00bd65;">Manjeet</span></span>
    </div>
    <button id="lang-btn">English</button>
</header>

<div class="container">
    <h1>प्रीमियम वेबसाइट ओवरव्यू</h1>
    <p class="tagline">अपने बिज़नेस को ऑनलाइन लाएं और कहीं से भी हैंडल करें।</p>

    <!-- Final Slider HTML -->
    <div class="slider-outer">
        <button class="nav-btn prev" onclick="moveSlide(-1)">❮</button>
        <button class="nav-btn next" onclick="moveSlide(1)">❯</button>
        
        <div class="slider-track" id="track">
            <div class="slide"><img src="./images/p1.jpg" class="mockup-img"></div>
            <div class="slide"><img src="./images/p2.jpg" class="mockup-img"></div>
            <div class="slide"><img src="./images/p3.jpg" class="mockup-img"></div>
            <div class="slide"><img src="./images/p4.jpg" class="mockup-img"></div>
            <div class="slide"><img src="./images/p5.jpg" class="mockup-img"></div>
            <div class="slide"><img src="./images/p6.jpg" class="mockup-img"></div>
        </div>
    </div>

    <!-- Features -->
    <div class="features-section">
        <h2>पैकेज में क्या-क्या शामिल है?</h2>
        <div class="feature-grid">
            <div class="feature-item"><i class="fas fa-globe"></i> <span>डोमेन और होस्टिंग (1 साल फ्री)</span></div>
            <div class="feature-item"><i class="fas fa-shield-alt"></i> <span>SSL सुरक्षा (HTTPS)</span></div>
            <div class="feature-item"><i class="fas fa-mobile-alt"></i> <span>मोबाइल रिस्पॉन्सिव डिज़ाइन</span></div>
            <div class="feature-item"><i class="fas fa-bolt"></i> <span>सुपर फास्ट लोडिंग</span></div>
        </div>
    </div>

    <a href="https://wa.me" class="btn-quote">Request Quote Now</a>
</div>

<script>
    let current = 0;
    const track = document.getElementById('track');
    const slides = document.querySelectorAll('.slide');

    function moveSlide(direction) {
        current += direction;
        
        // Loop Logic
        if (current < 0) current = slides.length - 1;
        if (current >= slides.length) current = 0;
        
        const offset = current * 100;
        track.style.transform = `translateX(-${offset}%)`;
    }
</script>

</body>
</html>
