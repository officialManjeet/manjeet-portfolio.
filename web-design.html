<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Manjeet | Web Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#fff;
    color:#333;
}

/* HEADER */
header{
    padding:12px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-area img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.logo-area span{
    font-weight:800;
    font-size:1rem;
}

.logo-area b{color:#00bd65;}

/* HERO */
.hero{
    text-align:center;
    padding:20px;
}

.hero h2{
    color:#00bd65;
}

/* SLIDER */
.slider-section{
    text-align:center;
    position:relative;
}

.slider-track{
    display:flex;
    transition:0.5s;
}

.slide{
    min-width:100%;
    display:flex;
    justify-content:center;
    padding:0 60px;
}

.slide img{
    width:100%;
    max-width:500px;
    height:auto;
    border-radius:15px;
}

/* NAV */
.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:#000;
    color:#fff;
    border:none;
    width:40px;
    height:40px;
    border-radius:50%;
}

.prev{left:10px;}
.next{right:10px;}

/* PRICING */
.pricing{
    padding:20px;
    text-align:center;
}

.card{
    border:1px solid #ddd;
    padding:20px;
    margin:10px;
    border-radius:10px;
}

/* PORTFOLIO */
.portfolio{
    padding:20px;
    text-align:center;
}
.portfolio img{
    width:180px;
    margin:5px;
    border-radius:10px;
}

/* FORM */
.form{
    padding:20px;
    text-align:center;
}
.form input,.form textarea{
    width:90%;
    padding:10px;
    margin:8px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* BUTTON */
.btn{
    background:#00ff88;
    padding:12px 25px;
    border-radius:25px;
    border:none;
    font-weight:700;
}

/* MOBILE */
@media(max-width:768px){
.slide{padding:0 20px;}
}
</style>

</head>

<body>

<header>
<div class="logo-area">
<img src="./images/sel.png">
<span>OFFICIAL <b>MANJEET</b></span>
</div>
</header>

<!-- HERO -->

<div class="hero">
<h2>🚀 Grow Your Business Online</h2>
<p>हम ऐसी वेबसाइट बनाते हैं जो client लेकर आए 💰</p>
</div>

<!-- SLIDER -->

<div class="slider-section">

<button class="nav-btn prev" onclick="move(-1)">❮</button> <button class="nav-btn next" onclick="move(1)">❯</button>

<div class="slider-track" id="track">
<div class="slide"><img src="./images/p1.jpg"></div>
<div class="slide"><img src="./images/p2.jpg"></div>
<div class="slide"><img src="./images/p3.jpg"></div>
</div>

</div>

<!-- PRICING -->

<div class="pricing">
<h2>💰 Pricing</h2>

<div class="card">
<h3>₹4999</h3>
<p>Basic Website</p>
</div>

<div class="card">
<h3>₹9999</h3>
<p>Standard Website</p>
</div>

<div class="card">
<h3>₹14999</h3>
<p>Premium Website</p>
</div>

</div>

<!-- PORTFOLIO -->

<div class="portfolio">
<h2>🎨 Our Work</h2>
<img src="./images/p1.jpg">
<img src="./images/p2.jpg">
<img src="./images/p3.jpg">
</div>

<!-- FORM -->

<div class="form">

<h2>📩 Get Quote</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Your Phone">
<textarea id="msg" placeholder="Your Requirement"></textarea>

<button onclick="send()" class="btn">Send on WhatsApp</button>

</div>

<script>
let i=0;
const track=document.getElementById("track");
const slides=document.querySelectorAll(".slide");

function move(d){
i=(i+d+slides.length)%slides.length;
track.style.transform=`translateX(-${i*100}%)`;
}

setInterval(()=>move(1),3000);

/* WHATSAPP SEND */
function send(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let msg=document.getElementById("msg").value;

let text = `Hello, I want website\n\nName: ${name}\nPhone: ${phone}\nRequirement: ${msg}`;

let url = "https://wa.me/917079216939?text=" + encodeURIComponent(text);

window.open(url, "_blank");
}
</script>

</body>
</html>
