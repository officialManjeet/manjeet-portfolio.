<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Solutions | Official Manjeet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        /* --- Clean White Professional Background --- */
        body {
            margin: 0; padding: 0;
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
            color: #333;
            min-height: 100vh; overflow-x: hidden;
        }

        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            background: #ffffff; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #333; }
        .logo-box img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #00ff88; }
        .logo-box span { font-weight: 800; text-transform: uppercase; font-size: 1rem; }

        #lang-btn {
            background: #00ff88; color: #000; border: none;
            padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: 700;
        }

        .container { width: 100%; padding-top: 30px; text-align: center; }

        h1 { font-size: 2.5rem; font-weight: 800; color: #00bd65; margin-bottom: 10px; }
        .tagline { font-size: 1.1rem; color: #666; margin-bottom: 40px; }

        /* --- FULL SCREEN SLIDER (6 PAGES) --- */
        .slider-wrapper {
            position: relative;
            width: 100vw;
            height: 500px;
            margin: auto;
            overflow: hidden;
            background: #fdfdfd;
        }

        .slider-track {
            display: flex;
            width: 600%; /* 6 slides ke liye */
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide {
            width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .mockup-img {
            width: 85%;
            max-width: 1100px;
            height: 85%;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
            background: #eee;
        }

        .slide-info {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #00bd65;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- TRANSPARENT SYMBOLS < > --- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            color: rgba(0, 189, 101, 0.3);
            border: none;
            font-size: 100px; 
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            font-family: serif;
            padding: 0 20px;
        }

        .nav-btn:hover:not(:disabled) { color: #00bd65; transform: translateY(-50%) scale(1.1); }
        .nav-btn:disabled { color: #eee; cursor: not-allowed; }

        .prev { left: 15px; }
        .next { right: 15px; }

        /* --- Action Buttons --- */
        .btn-quote {
            display: inline-block; padding: 18px 60px; background: #00ff88;
            color: #000; text-decoration: none; font-weight: 800; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2); transition: 0.4s; margin-top: 40px;
            text-transform: uppercase;
        }

        .back-nav { margin-top: 30px; padding-bottom: 40px; }
        .btn-back { 
            background: none; border: none; color: #999; 
            font-size: 1rem; cursor: pointer; font-weight: 600;
            text-transform: uppercase; transition: 0.3s;
        }
        
        /* Wobble effect on hover */
        @keyframes wobble {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }
        .btn-back:hover { color: #00bd65; animation: wobble 0.5s infinite; }

        @media (max-width: 768px) {
            .slider-wrapper { height: 350px; }
            .nav-btn { font-size: 60px; }
            .prev { left: 5px; } .next { right: 5px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <!-- sel.png image path correctly matched from your folder -->
        <img src="images/sel.png" alt="Logo">
        <span>Official<span style="color: #00bd65;">Manjeet</span></span>
    </div>
    <button id="lang-btn" onclick="toggleLang()">English</button>
</header>

<div class="container">
    <h1 id="main-title">प्रीमियम वेबसाइट ओवरव्यू</h1>
    <p class="tagline" id="main-tagline">अपने बिज़नेस को <span>ऑनलाइन</span> लाएं और कहीं से भी <span>हैंडल</span> करें।</p>

    <div class="slider-wrapper">
        <!-- Transparent < and > Symbols -->
        <button class="nav-btn prev" id="prevBtn" onclick="moveSlide(-1)">&#10094;</button>
        <button class="nav-btn next" id="nextBtn" onclick="moveSlide(1)">&#10095;</button>

        <div class="slider-track" id="track">
            <!-- 6 Images from your folder: images/p1.jpg, etc. -->
            <div class="slide">
                <img src="images/p1.jpg" onerror="this.style.background='#eee'" class="mockup-img">
                <div class="slide-info" id="c1">1. Home Page Overview</div>
            </div>
            <div class="slide">
                <img src="images/p2.jpg" onerror="this.style.background='#eee'" class="mockup-img">
                <div class="slide-info" id="c2">2. Our Services Details</div>
            </div>
            <div class="slide">
                <img src="images/p3.jpg" onerror="this.style.background='#eee'" class="mockup-img">
                <div class="slide-info" id="c3">3. Work Portfolio Gallery</div>
            </div>
            <div class="slide">
                <img src="images/p4.jpg" onerror="this.style.background='#eee'" class="mockup-img">
                <div class="slide-info" id="c4">4. Contact & Enquiry Form</div>
            </div>
            <div class="slide">
                <img src="images/p5.jpg" onerror="this.style.background='#eee'" class="mockup-img">
                <div class="slide-info" id="c5">5. Business Dashboard</div>
            </div>
            <div class="slide">
                <img src="images/p6.jpg" onerror="this.style.background='#eee'" class="mockup-img">
                <div class="slide-info" id="c6">6. Team & About Section</div>
            </div>
        </div>
    </div>

    <!-- Change 91XXXXXXXXXX to your real WhatsApp number -->
    <a href="https://wa.me Manjeet, I want to discuss a Web Design project." class="btn-quote" id="quote-btn">Request Quote Now</a>
    
    <div class="back-nav">
        <!-- History Back: goes back 1 page -->
        <button onclick="window.history.back();" class="btn-back" id="back-btn">← GO BACK</button>
    </div>
</div>

<script>
    let current = 0;
    const total = 6;
    const track = document.getElementById('track');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function moveSlide(dir) {
        current += dir;
        if (current >= total - 1) { current = total - 1; nextBtn.disabled = true; } 
        else { nextBtn.disabled = false; }

        if (current <= 0) { current = 0; prevBtn.disabled = true; } 
        else { prevBtn.disabled = false; }

        track.style.transform = `translateX(-${current * 100}vw)`;
    }

    // Initialize
    moveSlide(0);

    // Auto-slide every 6 seconds
    setInterval(() => {
        if (current < total - 1) moveSlide(1);
    }, 6000);

    // Language Toggle
    let lang = 'hi';
    const ui = {
        hi: {
            title: "प्रीमियम वेबसाइट ओवरव्यू",
            tagline: "अपने बिज़नेस को <span>ऑनलाइन</span> लाएं और कहीं से भी <span>हैंडल</span> करें।",
            c1: "1. मुख्य पृष्ठ ओवरव्यू", c2: "2. सेवाओं का विवरण", c3: "3. वर्क पोर्टफोलियो गैलरी", c4: "4. संपर्क फ़ॉर्म और पूछताछ", c5: "5. बिज़नेस डैशबोर्ड", c6: "6. टीम और हमारे बारे में",
            btn: "अभी रेट पूछें", back: "← पीछे जाएं", langBtn: "English"
        },
        en: {
            title: "Premium Website Overview",
            tagline: "Bring your business <span>Online</span> and <span>Handle</span> it easily from anywhere.",
            c1: "1. Home Page Overview", c2: "2. Our Services Details", c3: "3. Work Portfolio Gallery", c4: "4. Contact & Enquiry Form", c5: "5. Business Dashboard", c6: "6. Team & About Section",
            btn: "Request Quote Now", back: "← GO BACK", langBtn: "Hindi"
        }
    };

    function toggleLang() {
        lang = lang === 'hi' ? 'en' : 'hi';
        const d = ui[lang];
        document.getElementById('main-title').innerText = d.title;
        document.getElementById('main-tagline').innerHTML = d.tagline;
        document.getElementById('c1').innerText = d.c1;
        document.getElementById('c2').innerText = d.c2;
        document.getElementById('c3').innerText = d.c3;
        document.getElementById('c4').innerText = d.c4;
        document.getElementById('c5').innerText = d.c5;
        document.getElementById('c6').innerText = d.c6;
        document.getElementById('quote-btn').innerText = d.btn;
        document.getElementById('back-btn').innerText = d.back;
        document.getElementById('lang-btn').innerText = d.langBtn;
    }
</script>
</body>
</html>
