<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Solutions | Official Manjeet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        /* --- Dark Premium Background --- */
        body {
            margin: 0; padding: 0;
            background: #0b0e14;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 168, 232, 0.05) 0%, transparent 40%);
            font-family: 'Poppins', sans-serif;
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-box img { width: 35px; border-radius: 50%; border: 1.5px solid #00ff88; }

        #lang-btn {
            background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88;
            padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: 700;
        }

        .container { max-width: 1200px; margin: auto; padding: 60px 20px; text-align: center; }

        h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; color: #00ff88; margin-bottom: 40px; }

        /* --- IMAGE SLIDER SECTION --- */
        .slider-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: auto;
            overflow: hidden;
            border-radius: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .main-slider {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .slide-box {
            min-width: 100%;
            background: #fff;
            position: relative;
        }

        /* Image jaisi visual look */
        .slide-box img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* Nav Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #00ff88;
            border: 1px solid #00ff88;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.2rem;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { background: #00ff88; color: #000; }
        .prev { left: 20px; }
        .next { right: 20px; }

        /* Slide Captions */
        .caption-bar {
            background: #161b22;
            padding: 20px;
            color: #00ff88;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Footer Info --- */
        .tagline { margin: 40px 0; font-size: 1.2rem; color: #aaa; }
        .btn-quote {
            display: inline-block; padding: 18px 60px; background: #00ff88;
            color: #000; text-decoration: none; font-weight: 800; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3); transition: 0.3s;
        }
        .btn-back { display: inline-block; margin-top: 30px; color: #666; text-decoration: none; }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-box">
        <img src="images/sel.png" alt="Logo">
        <span>Official<span style="color: #00ff88;">Manjeet</span></span>
    </a>
    <button id="lang-btn" onclick="toggleLang()">English</button>
</header>

<div class="container">
    <h1 id="main-title">वेबसाइट डिज़ाइन टेम्पलेट्स</h1>

    <div class="slider-container">
        <button class="nav-btn prev" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn next" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>

        <div class="main-slider" id="slider">
            <!-- Slide 1: Career Page Overview -->
            <div class="slide-box">
                <img src="https://images.unsplash.com" alt="Career Page">
                <div class="caption-bar" id="cap1">Career & Job Portal Overview</div>
            </div>
            <!-- Slide 2: Contact Page Design -->
            <div class="slide-box">
                <img src="https://images.unsplash.com" alt="Contact Design">
                <div class="caption-bar" id="cap2">Modern Contact & Enquiry Form</div>
            </div>
            <!-- Slide 3: Mobile View Template -->
            <div class="slide-box">
                <img src="https://images.unsplash.com" alt="Mobile Template">
                <div class="caption-bar" id="cap3">100% Responsive Mobile Interface</div>
            </div>
        </div>
    </div>

    <p class="tagline" id="main-tagline">अपने बिज़नेस को <b>ऑनलाइन</b> लाएं और दुनिया के किसी भी कोने से आसानी से <b>हैंडल</b> करें।</p>

    <a href="https://wa.me" class="btn-quote" id="quote-btn">अभी रेट पूछें</a>
    <br>
    <a href="index.html" class="btn-back" id="back-btn">← होम पर वापस जाएं</a>
</div>

<script>
    let currentSlide = 0;
    const slider = document.getElementById('slider');
    const totalSlides = 3;

    function moveSlide(step) {
        currentSlide = (currentSlide + step + totalSlides) % totalSlides;
        slider.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    // Auto-Slide every 5 seconds
    setInterval(() => moveSlide(1), 5000);

    // Language Toggle
    let lang = 'hi';
    const ui = {
        hi: {
            title: "वेबसाइट डिज़ाइन टेम्पलेट्स",
            tagline: "अपने बिज़नेस को <b>ऑनलाइन</b> लाएं और दुनिया के किसी भी कोने से आसानी से <b>हैंडल</b> करें।",
            c1: "कैरियर और जॉब पोर्टल ओवरव्यू",
            c2: "मॉडर्न कांटेक्ट और इन्क्वायरी फॉर्म",
            c3: "100% रिस्पॉन्सिव मोबाइल इंटरफ़ेस",
            btn: "अभी रेट पूछें", back: "← होम पर वापस जाएं", langBtn: "English"
        },
        en: {
            title: "Website Design Templates",
            tagline: "Bring your business <b>Online</b> and <b>Handle</b> it easily from anywhere.",
            c1: "Career & Job Portal Overview",
            c2: "Modern Contact & Enquiry Form",
            c3: "100% Responsive Mobile UI",
            btn: "Request Quote Now", back: "← Back to Home", langBtn: "Hindi"
        }
    };

    function toggleLang() {
        lang = lang === 'hi' ? 'en' : 'hi';
        const d = ui[lang];
        document.getElementById('main-title').innerText = d.title;
        document.getElementById('main-tagline').innerHTML = d.tagline;
        document.getElementById('cap1').innerText = d.c1;
        document.getElementById('cap2').innerText = d.c2;
        document.getElementById('cap3').innerText = d.c3;
        document.getElementById('quote-btn').innerText = d.btn;
        document.getElementById('back-btn').innerText = d.back;
        document.getElementById('lang-btn').innerText = d.langBtn;
    }
</script>

</body>
</html>
