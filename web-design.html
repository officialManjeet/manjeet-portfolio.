<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Design Solutions | Manjeet</title>
    <!-- Font Link -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            /* Exact match background jaisa aapne image mein dikhaya */
            background-color: #0b0e14;
            background-image: 
                radial-gradient(at 50% 0%, rgba(0, 255, 136, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(0, 255, 136, 0.1) 0px, transparent 50%);
            font-family: 'Poppins', sans-serif;
            color: white; 
            min-height: 100vh;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
        }

        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-section img {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 2px solid #00ff88;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .logo-section span { font-weight: 800; font-size: 22px; letter-spacing: 1px; }

        .container { max-width: 900px; margin: auto; padding: 40px 20px; text-align: center; }
        
        /* Glowing Title jaisa image mein "OUR SERVICES" hai */
        h1 { 
            color: #00ff88; 
            font-size: 2.8rem; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            font-weight: 800;
        }
        
        .project-image-box {
            width: 100%;
            max-width: 750px;
            height: 400px;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            background: #161b22;
        }
        .project-image-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Card look jaisa image mein hai */
        .content-info { 
            text-align: left; 
            background: rgba(255,255,255,0.03); 
            padding: 35px; 
            border-radius: 20px; 
            margin-top: 30px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 35px;
            background: transparent;
            color: #00ff88;
            border: 1.5px solid #00ff88;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-btn:hover { background: #00ff88; color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }

        ul { list-style: none; padding: 0; line-height: 2.5; color: #00ff88; }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <img src="images/sel.png" alt="Manjeet">
        <span>Official<span style="color: #00ff88;">Manjeet</span></span>
    </div>
</header>

<div class="container">
    <h1>Web Design Showcase</h1>
    
    <div class="project-image-box">
        <img src="https://images.unsplash.com" alt="Sample">
    </div>

    <div class="content-info">
        <h2 style="color: white;">Why Choose Our Web Design?</h2>
        <p style="color: #8b949e;">हम आपके बिज़नेस के लिए ऐसी वेबसाइट बनाते हैं जो न केवल दिखने में अच्छी हो, बल्कि गूगल पर रैंक भी करे।</p>
        <ul>
            <li>✅ 100% Mobile Responsive</li>
            <li>✅ Ultra Fast Loading Speed</li>
            <li>✅ SEO Optimized Layout</li>
        </ul>
    </div>

    <a href="card3.html" class="back-btn">Back to Services</a>
</div>

</body>
</html>
