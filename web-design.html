<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Solutions | Official Manjeet</title>
    
    <style>
        body {
            margin: 0; padding: 0;
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
            padding-top: 50px; 
            text-align: center; 
            position: relative; /* Buttons ko screen ke hisaab se align karne ke liye */
            min-height: 600px;
        }

        /* --- CLEAN SLIDER WITHOUT BOX --- */
        .slider-outer {
            position: relative; 
            width: 80%;           /* Beech wali image ka size */
            max-width: 1100px; 
            margin: auto;
            z-index: 1;
        }

        .slider-track-container {
            width: 100%;
            overflow: visible;    /* Side images dikhane ke liye */
        }

        .slider-track { 
            display: flex; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.3, 1); 
            gap: 50px;            /* Images ke beech ka gap */
        }

        .slide { 
            min-width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            opacity: 0.2;         /* Side wali images halki dikhengi */
            transition: 0.5s;
        }

        .slide.active {
            opacity: 1;           /* Beech wali image saaf */
        }

        .mockup-img {
            width: 100%;
            height: 550px;        
            object-fit: cover; 
            object-position: top;
            border-radius: 10px;
            transition: 3s ease-in-out;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .mockup-img:hover {
            object-position: bottom;
        }

        /* --- BUTTONS ON SCREEN EDGES (LEFT & RIGHT MID) --- */
        .nav-btn {
            position: fixed;      /* Screen par chipka rahega */
            top: 50%;             /* Top se bilkul beech mein */
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8); /* Screenshot jaisa dark button */
            color: #fff;
            border: none; 
            font-size: 30px; 
            cursor: pointer; 
            z-index: 2000;        /* Sabse upar dikhne ke liye */
            width: 60px; 
            height: 60px; 
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: 0.3s;
        }

        /* Buttons ko bilkul website ke corners par chipka diya hai */
        .prev { left: 20px; }     /* Left corner se thodi duri */
        .next { right: 20px; }    /* Right corner se thodi duri */

        .nav-btn:hover { background: #00bd65; scale: 1.1; }

        @media (max-width: 768px) {
            .slider-outer { width: 85%; }
            .prev { left: 10px; }
            .next { right: 10px; }
            .nav-btn { width: 45px; height: 45px; font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>प्रीमियम वेबसाइट ओवरव्यू</h1>
    
    <!-- Navigation Buttons - Ab ye Screen ke Corners par hain -->
    <button class="nav-btn prev" onclick="moveSlide(-1)">❮</button>
    <button class="nav-btn next" onclick="moveSlide(1)">❯</button>

    <div class="slider-outer">
        <div class="slider-track-container">
            <div class="slider-track" id="track">
                <div class="slide active"><img src="./images/p1.jpg" class="mockup-img"></div>
                <div class="slide"><img src="./images/p2.jpg" class="mockup-img"></div>
                <div class="slide"><img src="./images/p3.jpg" class="mockup-img"></div>
                <div class="slide"><img src="./images/p4.jpg" class="mockup-img"></div>
                <div class="slide"><img src="./images/p5.jpg" class="mockup-img"></div>
                <div class="slide"><img src="./images/p6.jpg" class="mockup-img"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let current = 0;
    const track = document.getElementById('track');
    const slides = document.querySelectorAll('.slide');

    function moveSlide(direction) {
        current += direction;
        
        if (current < 0) current = slides.length - 1;
        if (current >= slides.length) current = 0;
        
        const gap = 50; 
        const slideWidth = track.offsetWidth;
        const move = current * (slideWidth + gap);
        
        track.style.transform = `translateX(-${move}px)`;

        slides.forEach((slide, index) => {
            slide.classList.toggle('active', index === current);
        });
    }
</script>

</body>
</html>
