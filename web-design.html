<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Manjeet | Web Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Poppins',sans-serif;
    background:#fff;
    color:#333;
}

/* HEADER */
header{
    padding:12px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    background:#fff;
    z-index:100;
}
.logo-area{
    display:flex;
    align-items:center;
    gap:10px;
}
.logo-area img{
    width:40px;
    height:40px;
    border-radius:50%;
}
.logo-area span{
    font-weight:800;
    font-size:1rem;
}
.logo-area b{color:#00bd65;}
.lang-btn{
    background:#00bd65;
    color:#fff;
    border:none;
    padding:8px 18px;
    border-radius:30px;
    cursor:pointer;
}

/* HERO */
.hero{
    text-align:center;
    padding:20px;
    position:relative;
}
.hero h2{
    color:#00bd65;
    margin-bottom:10px;
}
.hero p{
    color:#555;
    margin-bottom:15px;
}
/* PRO UPGRADE BADGE */
.pro-badge{
    display:inline-block;
    background:#ff4d4d;
    color:#fff;
    padding:5px 15px;
    border-radius:20px;
    font-weight:700;
    font-size:0.9rem;
    margin-bottom:10px;
}
/* NEXT LEVEL BANNER */
.next-level{
    display:block;
    background:linear-gradient(90deg,#00bd65,#00ff88);
    color:#fff;
    padding:12px 20px;
    margin:10px auto;
    width:90%;
    border-radius:25px;
    font-weight:700;
    text-align:center;
}

/* SLIDER */
.slider-section{
    text-align:center;
    position:relative;
    margin-bottom:30px;
}
.slider-container{
    overflow:hidden;
    max-width:100%;
}
.slider-track{
    display:flex;
    transition:0.5s;
}
.slide{
    min-width:100%;
    display:flex;
    justify-content:center;
    padding:0 15px;
}
.slide img{
    width:100%;
    max-width:650px;
    height:auto;
    border-radius:15px;
}
/* NAV BUTTONS */
.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:#000;
    color:#fff;
    border:none;
    width:45px;
    height:45px;
    border-radius:50%;
    cursor:pointer;
    z-index:10;
}
.prev{left:10px;}
.next{right:10px;}

/* PRICING */
.pricing{
    padding:20px;
    text-align:center;
}
.card{
    border:1px solid #ddd;
    padding:20px;
    margin:10px;
    border-radius:10px;
}

/* PORTFOLIO */
.portfolio{
    padding:20px;
    text-align:center;
}
.portfolio img{
    width:180px;
    margin:5px;
    border-radius:10px;
}

/* FORM */
.form{
    padding:20px;
    text-align:center;
}
.form input,.form textarea{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

/* BUTTONS */
.btn{
    background:#00ff88;
    padding:12px 25px;
    border-radius:25px;
    border:none;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
}
.footer-back-btn{
    display:block;
    margin:20px auto;
    background:#00bd65;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-weight:700;
}

/* MOBILE */
@media(max-width:768px){
.slide{padding:0 10px;}
.slide img{max-width:95%;}
.portfolio img{width:120px;}
.card{margin:10px 0;}
.next-level{width:95%;}
}
</style>
</head>

<body>

<header>
<div class="logo-area">
<img src="./images/sel.png" alt="Logo">
<span>OFFICIAL <b>MANJEET</b></span>
</div>
<button class="lang-btn" onclick="toggleLang()" id="langBtn">English</button>
</header>

<!-- HERO -->
<div class="hero">
<span class="pro-badge">Pro Upgrade</span>
<h2 id="heroTitle">🚀 Grow Your Business Online</h2>
<p id="heroText">We create websites that bring clients 💰</p>
<div class="next-level" id="nextLevelBanner">🔥 अगला Level – Upgrade Now!</div>
</div>

<!-- SLIDER -->
<div class="slider-section">
<button class="nav-btn prev" onclick="move(-1)">❮</button>
<button class="nav-btn next" onclick="move(1)">❯</button>

<div class="slider-container">
<div class="slider-track" id="track">
<div class="slide"><img src="./images/p1.jpg" alt="Slide 1"></div>
<div class="slide"><img src="./images/p2.jpg" alt="Slide 2"></div>
<div class="slide"><img src="./images/p3.jpg" alt="Slide 3"></div>
</div>
</div>
</div>

<!-- PRICING -->
<div class="pricing">
<h2 id="pricingTitle">💰 Pricing</h2>

<div class="card">
<h3>₹4999</h3>
<p id="basic">Basic Website</p>
</div>

<div class="card">
<h3>₹9999</h3>
<p id="standard">Standard Website</p>
</div>

<div class="card">
<h3>₹14999</h3>
<p id="premium">Premium Website</p>
</div>
</div>

<!-- PORTFOLIO -->
<div class="portfolio">
<h2 id="portfolioTitle">🎨 Our Work</h2>
<img src="./images/p1.jpg" alt="Portfolio 1">
<img src="./images/p2.jpg" alt="Portfolio 2">
<img src="./images/p3.jpg" alt="Portfolio 3">
</div>

<!-- FORM -->
<div class="form">
<h2 id="formTitle">📩 Get Quote</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Your Phone">
<textarea id="msg" placeholder="Your Requirement"></textarea>

<button onclick="send()" class="btn" id="sendBtn">Send on WhatsApp</button>
</div>

<!-- BACK BUTTON -->
<button onclick="history.back()" class="footer-back-btn" id="backBtn">⬅ Back</button>

<script>
/* SLIDER */
let i=0;
const track=document.getElementById("track");
const slides=document.querySelectorAll(".slide");

function move(d){
i=(i+d+slides.length)%slides.length;
track.style.transform=`translateX(-${i*100}%)`;
}
setInterval(()=>move(1),3000);

/* WHATSAPP SEND */
function send(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let msg=document.getElementById("msg").value;

if(!name || !phone || !msg){
    alert("Please fill all fields!");
    return;
}

let text = `Hello, I want a website\n\nName: ${name}\nPhone: ${phone}\nRequirement: ${msg}`;
let url = "https://wa.me/917079216939?text=" + encodeURIComponent(text);
window.open(url, "_blank");
}

/* LANGUAGE TOGGLE */
let lang="en"; 

function toggleLang(){
if(lang==="en"){
  lang="hi";
  document.getElementById("heroTitle").innerText="🚀 अपने बिजनेस को ऑनलाइन बढ़ाएं";
  document.getElementById("heroText").innerText="हम ऐसी वेबसाइट बनाते हैं जो client लेकर आए 💰";
  document.getElementById("pricingTitle").innerText="💰 कीमतें";
  document.getElementById("basic").innerText="बेसिक वेबसाइट";
  document.getElementById("standard").innerText="स्टैंडर्ड वेबसाइट";
  document.getElementById("premium").innerText="प्रीमियम वेबसाइट";
  document.getElementById("portfolioTitle").innerText="🎨 हमारा काम";
  document.getElementById("formTitle").innerText="📩 कोटेशन प्राप्त करें";
  document.getElementById("sendBtn").innerText="व्हाट्सएप पर भेजें";
  document.getElementById("langBtn").innerText="English";
  document.getElementById("nextLevelBanner").innerText="🔥 अगला Level – अभी Upgrade करें!";
}else{
  lang="en";
  document.getElementById("heroTitle").innerText="🚀 Grow Your Business Online";
  document.getElementById("heroText").innerText="We create websites that bring clients 💰";
  document.getElementById("pricingTitle").innerText="💰 Pricing";
  document.getElementById("basic").innerText="Basic Website";
  document.getElementById("standard").innerText="Standard Website";
  document.getElementById("premium").innerText="Premium Website";
  document.getElementById("portfolioTitle").innerText="🎨 Our Work";
  document.getElementById("formTitle").innerText="📩 Get Quote";
  document.getElementById("sendBtn").innerText="Send on WhatsApp";
  document.getElementById("langBtn").innerText="Hindi";
  document.getElementById("nextLevelBanner").innerText="🔥 Next Level – Upgrade Now!";
}
}
</script>

</body>
</html>
