<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Solutions | Official Manjeet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        /* --- Premium Background --- */
        body {
            margin: 0; padding: 0;
            background: #050a0f; 
            background-image: 
                radial-gradient(circle at 100% 0%, #3a2a1d 0%, transparent 45%), 
                radial-gradient(circle at 0% 100%, #004d4d 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, #050a0f 0%, #020508 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-box img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #00ff88; }
        .logo-box span { font-weight: 800; text-transform: uppercase; font-size: 1rem; }

        #lang-btn {
            background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88;
            padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: 700;
        }

        .container { max-width: 1200px; margin: auto; padding: 50px 20px; text-align: center; }

        h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; color: #00ff88; margin-bottom: 5px; }
        .tagline { font-size: 1.1rem; color: #aaa; margin-bottom: 30px; }

        /* --- 5-PAGE SLIDER --- */
        .slider-outer {
            position: relative; width: 100%; max-width: 1000px; margin: auto;
            border-radius: 20px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05); background: #111;
        }

        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        .slide { min-width: 100%; display: flex; flex-direction: column; }

        /* Mockup Layout */
        .mockup-display { display: flex; gap: 10px; padding: 15px; height: 400px; background: #222; }
        .desktop-view { flex: 2; background: #333; border-radius: 8px; overflow: hidden; }
        .side-view { flex: 1; background: #333; border-radius: 8px; overflow: hidden; }
        .mockup-display img { width: 100%; height: 100%; object-fit: cover; border: none; }

        .slide-info { background: #161b22; padding: 15px; color: #00ff88; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }

        /* --- TRANSPARENT NAV BUTTONS --- */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: transparent; /* Pura transparent */
            color: rgba(0, 255, 136, 0.5); /* Halka green color */
            border: none;
            font-size: 50px; /* Bada size symbols ke liye */
            cursor: pointer; z-index: 10;
            transition: 0.3s;
            line-height: 1;
        }

        .nav-btn:hover { color: #00ff88; transform: translateY(-50%) scale(1.2); }
        .prev { left: 10px; } 
        .next { right: 10px; }

        /* --- Action Buttons --- */
        .btn-quote {
            display: inline-block; padding: 16px 50px; background: #00ff88;
            color: #000; text-decoration: none; font-weight: 800; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3); transition: 0.4s; margin-top: 40px;
            text-transform: uppercase;
        }

        .back-nav { margin-top: 30px; padding-bottom: 30px; }
        .btn-back { display: inline-block; color: #666; text-decoration: none; font-weight: 600; padding: 10px 20px; }

        @keyframes wobble {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px) rotate(-1deg); }
            50% { transform: translateX(4px) rotate(1deg); }
            100% { transform: translateX(0); }
        }
        .btn-back:hover { color: #00ff88; animation: wobble 0.5s infinite; }

        @media (max-width: 768px) {
            .mockup-display { flex-direction: column; height: auto; }
            .desktop-view, .side-view { height: 200px; }
            .nav-btn { font-size: 35px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-box">
        <img src="images/sel.png" alt="Logo">
        <span>Official<span style="color: #00ff88;">Manjeet</span></span>
    </a>
    <button id="lang-btn" onclick="toggleLang()">English</button>
</header>

<div class="container">
    <h1 id="main-title">प्रीमियम वेबसाइट ओवरव्यू</h1>
    <p class="tagline" id="main-tagline">अपने बिज़नेस को <span>ऑनलाइन</span> लाएं और कहीं से भी <span>हैंडल</span> करें।</p>

    <div class="slider-outer">
        <!-- Transparent Buttons with Symbols -->
        <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
        <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>

        <div class="slider-track" id="track">
            <!-- 5 Slides with Direct Image Links -->
            <div class="slide">
                <div class="mockup-display">
                    <div class="desktop-view"><img src="https://images.unsplash.com"></div>
                    <div class="side-view"><img src="https://images.unsplash.com"></div>
                </div>
                <div class="slide-info" id="c1">1. Home Page & Business Overview</div>
            </div>
            <div class="slide">
                <div class="mockup-display">
                    <div class="desktop-view"><img src="https://images.unsplash.com"></div>
                    <div class="side-view"><img src="https://images.unsplash.com"></div>
                </div>
                <div class="slide-info" id="c2">2. Our Services & Package Details</div>
            </div>
            <div class="slide">
                <div class="mockup-display">
                    <div class="desktop-view"><img src="https://images.unsplash.com"></div>
                    <div class="side-view"><img src="https://images.unsplash.com"></div>
                </div>
                <div class="slide-info" id="c3">3. Work Portfolio & Gallery</div>
            </div>
            <div class="slide">
                <div class="mockup-display">
                    <div class="desktop-view"><img src="https://images.unsplash.com"></div>
                    <div class="side-view"><img src="https://images.unsplash.com"></div>
                </div>
                <div class="slide-info" id="c4">4. Contact Us & Enquiry Form</div>
            </div>
            <div class="slide">
                <div class="mockup-display">
                    <div class="desktop-view"><img src="https://images.unsplash.com"></div>
                    <div class="side-view"><img src="https://images.unsplash.com"></div>
                </div>
                <div class="slide-info" id="c5">5. Business Dashboard & Analytics</div>
            </div>
        </div>
    </div>

    <a href="https://wa.me" class="btn-quote" id="quote-btn">Request Quote Now</a>
    
    <div class="back-nav">
        <a href="index.html" class="btn-back" id="back-btn">← BACK TO HOME</a>
    </div>
</div>

<script>
    let current = 0;
    const total = 5;
    const track = document.getElementById('track');

    function changeSlide(dir) {
        current = (current + dir + total) % total;
        track.style.transform = `translateX(-${current * 100}%)`;
    }

    setInterval(() => changeSlide(1), 6000);

    let lang = 'hi';
    const ui = {
        hi: {
            title: "प्रीमियम वेबसाइट ओवरव्यू",
            tagline: "अपने बिज़नेस को <span>ऑनलाइन</span> लाएं और कहीं से भी <span>हैंडल</span> करें।",
            c1: "1. मुख्य पृष्ठ और बिज़नेस ओवरव्यू",
            c2: "2. हमारी सेवाएं और पैकेज विवरण",
            c3: "3. वर्क पोर्टफोलियो और गैलरी",
            c4: "4. संपर्क फ़ॉर्म और पूछताछ",
            c5: "5. बिज़नेस डैशबोर्ड और एनालिटिक्स",
            btn: "अभी रेट पूछें", back: "← होम पर वापस जाएं", langBtn: "English"
        },
        en: {
            title: "Premium Website Overview",
            tagline: "Bring your business <span>Online</span> and <span>Handle</span> it easily from anywhere.",
            c1: "1. Home Page & Business Overview",
            c2: "2. Our Services & Package Details",
            c3: "3. Work Portfolio & Gallery",
            c4: "4. Contact Us & Enquiry Form",
            c5: "5. Business Dashboard & Analytics",
            btn: "Request Quote Now", back: "← Back to Home", langBtn: "Hindi"
        }
    };

    function toggleLang() {
        lang = lang === 'hi' ? 'en' : 'hi';
        const d = ui[lang];
        document.getElementById('main-title').innerText = d.title;
        document.getElementById('main-tagline').innerHTML = d.tagline;
        document.getElementById('c1').innerText = d.c1;
        document.getElementById('c2').innerText = d.c2;
        document.getElementById('c3').innerText = d.c3;
        document.getElementById('c4').innerText = d.c4;
        document.getElementById('c5').innerText = d.c5;
        document.getElementById('quote-btn').innerText = d.btn;
        document.getElementById('back-btn').innerText = d.back;
        document.getElementById('lang-btn').innerText = d.langBtn;
    }
</script>
</body>
</html>
