<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Optimization | Official Manjeet</title>
    <!-- Latest FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');

        body {
            margin: 0; padding: 0;
            background: #050a0f; 
            background-image: radial-gradient(circle at 0% 0%, #001f3f 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, #004d4d 0%, transparent 50%);
            color: white; font-family: 'Poppins', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- Stylish Header --- */
        header {
            padding: 20px 5%; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px); display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #00d2ff; }
        .brand-text { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .brand-text span { color: #00d2ff; }

        .btn-back {
            color: #ccc; text-decoration: none; font-size: 0.9rem; font-weight: 600;
            padding: 8px 20px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px; transition: 0.3s;
        }
        .btn-back:hover { border-color: #00d2ff; color: #00d2ff; background: rgba(0, 210, 255, 0.05); }

        /* --- Main Content Layout --- */
        .container {
            max-width: 1200px; margin: 60px auto; padding: 0 30px;
            display: grid; grid-template-columns: 1.2fr 0.8fr;
            gap: 60px; align-items: center;
        }

        @media (max-width: 968px) {
            .container { grid-template-columns: 1fr; text-align: center; margin: 30px auto; }
            .features li { justify-content: center; }
        }

        /* --- Left Side Content --- */
        .seo-icon-box { 
            display: inline-block; padding: 15px; 
            background: rgba(0, 210, 255, 0.1); 
            border-radius: 20px; margin-bottom: 25px;
        }
        .seo-icon-box i { font-size: 50px; color: #00d2ff; }

        h1 { font-size: clamp(2.5rem, 5vw, 3.8rem); font-weight: 800; line-height: 1.1; margin: 0 0 20px; }
        h1 span { color: #00d2ff; text-shadow: 0 0 30px rgba(0, 210, 255, 0.3); }

        p { color: #aaa; font-size: 1.1rem; line-height: 1.7; margin-bottom: 40px; max-width: 600px; }

        /* Pricing Card */
        .price-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 25px 35px; border-radius: 25px;
            display: inline-block; margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        .price-card span { font-size: 0.8rem; text-transform: uppercase; color: #00d2ff; font-weight: 700; letter-spacing: 1.5px; }
        .price-card h2 { font-size: 2.8rem; margin: 5px 0 0; font-weight: 800; }

        /* Feature List */
        .features { list-style: none; padding: 0; margin-bottom: 45px; }
        .features li { margin-bottom: 18px; font-size: 1.1rem; display: flex; align-items: center; gap: 15px; color: #eee; }
        .features i { color: #00d2ff; background: rgba(0, 210, 255, 0.1); padding: 8px; border-radius: 50%; font-size: 0.9rem; }

        .btn-main {
            display: inline-block; padding: 18px 50px; background: #00d2ff;
            color: #000; text-decoration: none; font-weight: 800;
            border-radius: 50px; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.3);
        }
        .btn-main:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0, 210, 255, 0.5); }

        /* --- Right Side: Expert Image --- */
        .expert-box { position: relative; }
        .expert-box img {
            width: 100%; max-width: 450px; border-radius: 30px;
            filter: grayscale(20%); border: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s;
        }
        .expert-box:hover img { filter: grayscale(0%); border-color: #00d2ff; transform: scale(1.02); }
        
        /* Floating Badge */
        .badge {
            position: absolute; bottom: 20px; left: -20px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 15px; border: 1px solid #00d2ff;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="brand">
        <img src="images/sel.png" alt="Logo"> <!-- Aapka Logo -->
        <div class="brand-text">OFFICIAL<span>MANJEET</span></div>
    </a>
    <a href="index.html" class="btn-back" id="back-btn">← Back to Home</a>
</header>

<div class="container">
    <div class="seo-content">
        <div class="seo-icon-box">
            <i class="fa-solid fa-magnifying-glass-chart"></i>
        </div>
        
        <h1 id="main-h1">Rank #1 on <br><span>Google Search</span></h1>
        <p id="main-p">Loading expertise...</p>

        <div class="price-card">
            <span id="price-label">Monthly Investment</span>
            <h2 id="price-val">₹4,999/-</h2>
        </div>

        <ul class="features" id="feat-list">
            <!-- Features load automatically -->
        </ul>

        <a href="https://wa.me" class="btn-main" id="cta-btn">Grow My Business</a>
    </div>

    <div class="expert-box">
        <img src="images/manjeet.png" alt="SEO Expert Manjeet"> <!-- Aapki Image -->
        <div class="badge">
            <div style="color: #00d2ff; font-weight: 800; font-size: 1.2rem;">99%</div>
            <div style="font-size: 0.7rem; text-transform: uppercase;">Success Rate</div>
        </div>
    </div>
</div>

<script>
    const translations = {
        en: {
            back: "← Back to Home",
            h1: "Rank #1 on <br><span>Google Search</span>",
            p: "Don't let your competitors take your customers. Our advanced SEO strategies ensure your website stays on top and generates consistent organic revenue.",
            priceL: "Monthly Investment",
            priceV: "₹4,999/-",
            btn: "Grow My Business",
            feats: ["Full Keyword Strategy", "Technical SEO Audit", "High-Authority Links", "Monthly Growth Reports"]
        },
        hi: {
            back: "← होम पर जाएं",
            h1: "गूगल में लाएं <br><span>नंबर #1 रैंकिंग</span>",
            p: "अपने ग्राहकों को कॉम्पिटिटर्स के पास न जाने दें। हमारी एडवांस SEO तकनीकें आपकी वेबसाइट को गूगल के पहले पेज पर लाकर ऑर्गेनिक सेल बढ़ाती हैं।",
            priceL: "मासिक निवेश",
            priceV: "₹4,999/-",
            btn: "बिज़नेस बढ़ाएं",
            feats: ["कीवर्ड रिसर्च स्ट्रेटेजी", "टेक्निकल SEO ऑडिट", "हाई-अथॉरिटी बैकलिंक्स", "मंथली प्रोग्रेस रिपोर्ट"]
        }
    };

    function applyLang() {
        const lang = localStorage.getItem('selectedLang') || 'en';
        const data = translations[lang];

        document.getElementById('back-btn').innerText = data.back;
        document.getElementById('main-h1').innerHTML = data.h1;
        document.getElementById('main-p').innerText = data.p;
        document.getElementById('price-label').innerText = data.priceL;
        document.getElementById('price-val').innerText = data.priceV;
        document.getElementById('cta-btn').innerText = data.btn;

        const list = document.getElementById('feat-list');
        list.innerHTML = "";
        data.feats.forEach(f => {
            list.innerHTML += `<li><i class="fa-solid fa-check"></i> ${f}</li>`;
        });
    }

    window.onload = applyLang;
</script>

</body>
</html>
