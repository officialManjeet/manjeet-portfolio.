<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Optimization | Official Manjeet</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');

        body {
            margin: 0; padding: 0;
            background: #ffffff; color: #1a1a1a;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            padding: 15px 5%; background: #fff;
            display: flex; align-items: center;
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #000; }
        .brand img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #00a8e8; }
        .brand-text { font-weight: 800; text-transform: uppercase; font-size: 1.1rem; }
        .brand-text span { color: #00a8e8; }

        .container {
            max-width: 1100px; margin: 50px auto; padding: 0 20px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; text-align: center; }
            .features li { justify-content: center; }
        }

        h1 { font-size: 3rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        h1 span { color: #00a8e8; }
        p { color: #666; font-size: 1.1rem; line-height: 1.7; margin-bottom: 30px; }

        .price-card {
            background: #f0faff; border-radius: 15px; padding: 20px 30px;
            display: inline-block; margin-bottom: 30px; border-left: 5px solid #00a8e8;
        }
        .price-card h2 { margin: 5px 0 0; color: #000; font-size: 2.2rem; }

        .features { list-style: none; padding: 0; margin-bottom: 30px; }
        .features li { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .features i { color: #00a8e8; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: flex-start; }
        @media (max-width: 850px) { .btn-group { align-items: center; } }

        .btn-main {
            display: inline-block; background: #00a8e8; color: #fff;
            padding: 15px 40px; border-radius: 50px; text-decoration: none;
            font-weight: 700; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,168,232,0.2);
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-3px); background: #0086b8; }

        /* Back Button Niche wala */
        .btn-back-bottom {
            cursor: pointer; background: transparent; border: 1px solid #ddd;
            padding: 10px 30px; border-radius: 50px; font-weight: 600;
            color: #777; transition: 0.3s; font-size: 0.85rem; text-transform: uppercase;
        }
        .btn-back-bottom:hover { background: #f8f9fa; color: #000; border-color: #999; }

        .expert-img { width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="brand">
        <img src="images/sel.png" alt="Logo">
        <div class="brand-text">OFFICIAL<span>MANJEET</span></div>
    </a>
</header>

<div class="container">
    <div class="content">
        <h1 id="h1-text">SEO Services</h1>
        <p id="p-text"></p>
        
        <div class="price-card">
            <small id="price-label"></small>
            <h2 id="price-val">₹4,999/-</h2>
        </div>

        <ul class="features" id="feat-list"></ul>

        <div class="btn-group">
            <a href="https://wa.me" class="btn-main" id="cta-btn">Contact Now</a>
            <!-- Back Button niche shift kar diya -->
            <button onclick="history.back()" class="btn-back-bottom" id="back-btn">← Back</button>
        </div>
    </div>
    
    <div style="text-align: center;">
        <img src="images/manjeet.png" class="expert-img" alt="SEO Expert">
    </div>
</div>

<script>
    const translations = {
        en: {
            back: "← BACK",
            h1: "Rank #1 on <br><span>Google Search</span>",
            p: "Boost your sales with our premium SEO strategies. We ensure your website ranks on the first page of Google.",
            priceL: "Monthly Package",
            btn: "GROW MY BUSINESS",
            feats: ["Keyword Strategy", "Technical SEO", "High Authority Backlinks", "Monthly Reports"]
        },
        hi: {
            back: "← वापस जाएं",
            h1: "गूगल में लाएं <br><span>नंबर #1 रैंकिंग</span>",
            p: "हमारी प्रीमियम SEO तकनीकों के साथ अपनी बिक्री बढ़ाएं। हम सुनिश्चित करते हैं कि आपकी वेबसाइट गूगल के पहले पेज पर रहे।",
            priceL: "मासिक पैकेज",
            btn: "बिज़नेस बढ़ाएं",
            feats: ["कीवर्ड रिसर्च", "टेक्निकल SEO", "हाई-अथॉरिटी बैकलिंक्स", "साप्ताहिक रिपोर्ट"]
        }
    };

    function applyLang() {
        // 1. Pehle localStorage check karega
        // 2. Phir URL parameter (?lang=hi) check karega
        const urlParams = new URLSearchParams(window.location.search);
        const langCode = localStorage.getItem('selectedLang') || urlParams.get('lang') || 'en';
        
        const data = translations[langCode];

        if(data) {
            document.getElementById('back-btn').innerText = data.back;
            document.getElementById('h1-text').innerHTML = data.h1;
            document.getElementById('p-text').innerText = data.p;
            document.getElementById('price-label').innerText = data.priceL;
            document.getElementById('cta-btn').innerText = data.btn;

            const list = document.getElementById('feat-list');
            list.innerHTML = "";
            data.feats.forEach(f => {
                list.innerHTML += `<li><i class="fa-solid fa-check-circle"></i> ${f}</li>`;
            });
        }
    }

    // Page load par apply karein
    window.onload = applyLang;
</script>

</body>
</html>
