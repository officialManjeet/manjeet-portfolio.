<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Management - Official Manjeet</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Premium Gradient Background */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; margin: 0; padding: 0; text-align: center; min-height: 100vh;
        }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #25d366; }
        .official { color: #25d366; font-weight: bold; font-size: 1.3rem; }
        .manjeet { color: #ffffff; font-weight: bold; font-size: 1.3rem; }
        
        .lang-btn { background: #00d2ff; border: none; color: #16213e; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .lang-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        /* Glassmorphism Cards */
        .card { 
            background: rgba(22, 33, 62, 0.6); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; padding: 30px; width: 280px; transition: 0.4s; 
        }
        .card:hover { border-color: #00d2ff; transform: translateY(-10px); background: rgba(22, 33, 62, 0.9); }
        .card i { font-size: 3.5rem; margin-bottom: 20px; color: #00d2ff; }

        .price { font-size: 1.5rem; font-weight: bold; color: #ff007a; margin: 15px 0; }
        .btn { display: inline-block; background: #25d366; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; width: 100%; border:none; cursor:pointer; }
        .btn:hover { background: #1ebd57; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

        /* Modal (Learn More Popup) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { background: #16213e; margin: 10% auto; padding: 30px; border: 1px solid #00d2ff; width: 80%; max-width: 500px; border-radius: 20px; position: relative; text-align: left; animation: fadeIn 0.3s; }
        .close { position: absolute; right: 20px; top: 15px; color: #94a3b8; font-size: 28px; cursor: pointer; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(-20px);} to {opacity: 1; transform: translateY(0);} }

        .hi-text { display: block; }
        .en-text { display: none; }
        .back-btn { background: transparent; border: 1.5px solid #94a3b8; padding: 8px 30px; color: #94a3b8; border-radius: 50px; cursor: pointer; margin-top: 40px; }
        .back-btn:hover { background: #25d366; border-color:#25d366; color:white; }
    </style>
</head>
<body id="mainBody">

    <div class="navbar">
        <div class="logo-area">
            <img src="images/sel.png" alt="Logo" class="logo-img">
            <div class="brand-name"><span class="official">Official</span> <span class="manjeet">Manjeet</span></div>
        </div>
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">English</button>
    </div>

    <div class="container">
        <h1 class="hi-text">सोशल मीडिया मैनेजमेंट</h1>
        <h1 class="en-text">Social Media Management</h1>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 40px;">
            <!-- Card 1 -->
            <div class="card">
                <i class="fas fa-pen-nib"></i>
                <h2 class="hi-text">कंटेंट क्रिएशन</h2>
                <h2 class="en-text">Content Creation</h2>
                <button class="btn" onclick="showDetails('content')">Learn More</button>
            </div>

            <!-- Card 2 -->
            <div class="card">
                <i class="fas fa-chart-line"></i>
                <h2 class="hi-text">प्रोफाइल ग्रोथ</h2>
                <h2 class="en-text">Profile Growth</h2>
                <button class="btn" onclick="showDetails('growth')">Learn More</button>
            </div>
        </div>

        <button class="back-btn" onclick="history.back()">← Back to Home</button>
    </div>

    <!-- Modal Box -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody">
                <!-- Content will be injected by JS -->
            </div>
            <a href="https://wa.me" class="btn" style="margin-top: 20px; text-align: center;">Chat on WhatsApp</a>
        </div>
    </div>

    <script>
        let currentLang = 'hi';

        const data = {
            content: {
                hi: "<h3>कंटेंट क्रिएशन की जानकारी:</h3><ul><li>हाई क्वालिटी रील्स बनाना।</li><li>ब्रैंडेड पोस्ट डिजाइन करना।</li><li>वायरल होने वाली हेडलाइंस लिखना।</li></ul>",
                en: "<h3>Content Creation Details:</h3><ul><li>Creating High-Quality Reels.</li><li>Branded Post Designing.</li><li>Writing Viral Headlines.</li></ul>"
            },
            growth: {
                hi: "<h3>प्रोफाइल ग्रोथ की जानकारी:</h3><ul><li>ऑर्गेनिक फॉलोअर्स बढ़ाना।</li><li>प्रोफाइल को सर्च में ऊपर लाना।</li><li>सही हैशटैग का इस्तेमाल।</li></ul>",
                en: "<h3>Profile Growth Details:</h3><ul><li>Growing Organic Followers.</li><li>SEO for Profile Ranking.</li><li>Using the Right Hashtags.</li></ul>"
            }
        };

        function showDetails(type) {
            document.getElementById('modalBody').innerHTML = data[type][currentLang];
            document.getElementById('detailsModal').style.display = "block";
        }

        function closeModal() { document.getElementById('detailsModal').style.display = "none"; }

        function toggleLang() {
            const hi = document.querySelectorAll('.hi-text');
            const en = document.querySelectorAll('.en-text');
            const btn = document.getElementById('langBtn');

            if (currentLang === 'hi') {
                hi.forEach(el => el.style.display = 'none');
                en.forEach(el => el.style.display = 'block');
                btn.innerText = "Hindi";
                currentLang = 'en';
            } else {
                hi.forEach(el => el.style.display = 'block');
                en.forEach(el => el.style.display = 'none');
                btn.innerText = "English";
                currentLang = 'hi';
            }
        }

        window.onclick = function(event) { if (event.target == document.getElementById('detailsModal')) closeModal(); }
    </script>
</body>
</html>
