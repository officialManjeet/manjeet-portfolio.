<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlights - Official Manjeet</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.05);
            --accent: #38bdf8;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px; /* मोबाइल के लिए पैडिंग कम की है */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 30px;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .highlight-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
            max-width: 800px; /* कंटेनर को थोड़ा बड़ा किया */
        }

        .video-box {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
            width: 100%; /* फुल विड्थ */
            max-width: 700px; /* डेस्कटॉप पर लिमिट */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* वीडियो को फुल फ्रेम दिखाने के लिए सेटिंग्स */
        video {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9; /* या 9 / 16 अगर वीडियो वर्टिकल है */
            border-radius: 12px;
            object-fit: cover; /* ताकि फ्रेम पूरा भरा रहे */
            background: #000;
            display: block;
        }

        .video-title {
            margin-top: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .video-desc {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 8px;
            line-height: 1.4;
            padding: 0 10px;
        }

        .back-btn {
            margin-top: 40px;
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--text);
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .back-btn:hover {
            background: var(--text);
            color: var(--bg);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .video-box { padding: 10px; }
            video { aspect-ratio: auto; } /* मोबाइल पर नेचुरल रेश्यो */
        }
    </style>
</head>
<body>

    <h1 id="highlightTitle">My Highlights</h1>

    <div class="highlight-container">
        <div class="video-box">
            <!-- पाथ 'videos' (छोटा v) एकदम सही है -->
            <video controls autoplay muted playsinline>
                <source src="videos/intro.mp4" type="video/mp4">
                आपका ब्राउज़र वीडियो सपोर्ट नहीं करता।
            </video>
            <div class="video-title" id="v1Title">My Journey</div>
            <p class="video-desc" id="v1Desc">मेरे प्रोफेशनल सफर की एक छोटी सी झलक।</p>
        </div>
    </div>

    <a href="index.html" class="back-btn" id="backBtn">Back To Home</a>

    <script>
        window.onload = function() {
            let lang = localStorage.getItem("preferredLang") || "EN";
            if (lang === "HI") {
                document.getElementById("highlightTitle").innerText = "मेरी खास झलकियाँ";
                document.getElementById("v1Title").innerText = "मेरी यात्रा";
                document.getElementById("v1Desc").innerText = "मेरे गांव से लेकर गुड़गांव तक के सफर की एक झलक।";
                document.getElementById("backBtn").innerText = "वापस होम पर";
            }
        };
    </script>

</body>
</html>
