<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional App Development | Official Manjeet</title>

<link href="https://fonts.googleapis.com" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com">

<style>
:root {
    --primary: #00d2ff;
    --secondary: #00ff88;
    --bg-dark: #050505;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body {
    /* White Professional Background Image */
    background: url('https://images.unsplash.com') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    line-height: 1.6;
}

/* Overlay to make text readable on white BG */
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: -1; }

header{display:flex; justify-content:space-between; align-items:center; padding:15px 5%; position:sticky; top:0; z-index:1000; background: rgba(5,5,5,0.95); border-bottom: 1px solid rgba(255,255,255,0.1);}
.logo-area{display:flex; align-items:center; gap:10px;}
.logo-area img{width:45px; height:45px; border-radius:50%; border:2px solid var(--secondary);}

/* Header Buttons */
.nav-buttons { display: flex; gap: 15px; align-items: center; }
.back-btn { color: #fff; text-decoration: none; font-weight: 600; font-size: 14px; border: 1px solid #444; padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
.back-btn:hover { background: #fff; color: #000; }
.lang-btn { background: var(--primary); color:#000; border:none; padding:6px 15px; border-radius:20px; cursor:pointer; font-weight:600; }

/* Portfolio Grid */
.portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
.project-card { border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); transition: 0.4s; }
.project-card:hover { transform: translateY(-10px); border-color: var(--secondary); }
.project-card img { width: 100%; height: 200px; object-fit: cover; }
.project-info { padding: 15px; text-align: center; }

section { text-align: center; padding: 50px 20px; }
h1 span { color: var(--primary); }
footer { text-align: center; padding: 30px; border-top: 1px solid rgba(255,255,255,0.1); color: #888; }
</style>
</head>
<body>

<div class="overlay"></div>

<header>
    <div class="logo-area">
        <img src="./images/sel.png" alt="Logo">
        <span>OFFICIAL <b>MANJEET</b></span>
    </div>
    <div class="nav-buttons">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> वापस जाएं</a>
        <button class="lang-btn" onclick="toggleLang()">EN / HI</button>
    </div>
</header>

<section>
    <h1 id="main-title">Professional <span>App Development</span></h1>
    <p id="main-desc">हम आपके बिजनेस के लिए हाई-क्वालिटी मोबाइल ऐप्स बनाते हैं।</p>
</section>

<!-- Projects Gallery -->
<h2 style="text-align:center; color:var(--secondary);">Our Latest Projects</h2>
<div class="portfolio-grid">
    <div class="project-card">
        <img src="https://images.unsplash.com" alt="E-commerce App">
        <div class="project-info"><h3>E-commerce App</h3><p>Online Shopping Solution</p></div>
    </div>
    <div class="project-card">
        <img src="https://images.unsplash.com" alt="Fintech App">
        <div class="project-info"><h3>Fintech App</h3><p>Trading & Finance UI</p></div>
    </div>
    <div class="project-card">
        <img src="https://images.unsplash.com" alt="Social Media">
        <div class="project-info"><h3>Social App</h3><p>Connect with World</p></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Official Manjeet. All Rights Reserved.</p>
</footer>

<script>
    function toggleLang() {
        const title = document.getElementById('main-title');
        const desc = document.getElementById('main-desc');
        if(title.innerHTML.includes("Professional")) {
            title.innerHTML = "प्रोफेशनल <span>ऐप डेवलपमेंट</span>";
            desc.innerHTML = "We build high-quality mobile apps for your business.";
        } else {
            title.innerHTML = "Professional <span>App Development</span>";
            desc.innerHTML = "हम आपके बिजनेस के लिए हाई-क्वालिटी मोबाइल ऐप्स बनाते हैं।";
        }
    }
</script>

</body>
</html>
