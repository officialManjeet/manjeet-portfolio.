<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Official Manjeet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .about-card {
            background: #121212;
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-wrap: wrap; 
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .image-section {
            flex: 1;
            min-width: 350px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .text-section {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .text-section h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            border: 1px solid #555;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            align-self: flex-start;
        }

        .back-btn:hover {
            background: white;
            color: black;
        }

        @media (max-width: 768px) {
            .about-card { flex-direction: column; }
            .text-section { padding: 30px; text-align: center; }
            .back-btn { align-self: center; }
            .image-section { height: 400px; }
            .text-section h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="about-card">
        <div class="image-section">
            <img src="images/bg.jpg" alt="Manjeet Photo"> 
        </div>

        <div class="text-section">
            <h1 id="aboutTitle">About Me</h1>
            <p id="aboutPara">
                I am Manjeet, a passionate Full Stack Developer based in Gurgaon. My journey started in a small village, and my curiosity for technology led me to complete my BCA in 2022 from JB Knowledge Park, Faridabad.
            </p>
            <a href="index.html" class="back-btn" id="backBtn">← Back to Home</a>
        </div>
    </div>

<script>
    window.onload = function() {
        let lang = localStorage.getItem("preferredLang") || "EN";
        
        let title = document.getElementById("aboutTitle");
        let para = document.getElementById("aboutPara");
        let backBtn = document.getElementById("backBtn");

        if (lang === "HI") {
            title.innerHTML = "मेरे बारे में";
            para.innerHTML = "नमस्ते! मैं मंजीत हूँ, गुड़गांव में रहने वाला एक पैशनेट **Full Stack Developer**। मेरा सफर एक छोटे से गाँव से शुरू हुआ और टेक्नोलॉजी के प्रति मेरी जिज्ञासा मुझे 2022 में **JB नॉलेज पार्क, फरीदाबाद** ले आई, जहाँ मैंने अपना **BCA** पूरा किया।<br><br>शुरुआत में मैंने **MIS Executive** के तौर पर काम किया, लेकिन कोडिंग के प्रति मेरे जुनून ने मुझे फुल स्टैक डेवलपर बनने के लिए प्रेरित किया। मुझे चीज़ों को शुरू से 'बिल्ड' करना पसंद है, चाहे वो कोड हो या एक नया स्टाइल। मेरी इस डिजिटल यात्रा का हिस्सा बनने के लिए धन्यवाद।";
            if(backBtn) backBtn.innerHTML = "← वापस होम पर";
        } else {
            title.innerHTML = "About Me";
            para.innerHTML = "I am Manjeet, a passionate **Full Stack Developer** based in Gurgaon. My journey started in a small village, and my curiosity for technology led me to complete my **BCA** in 2022 from JB Knowledge Park, Faridabad.<br><br>After starting my career as an **MIS Executive**, my passion for coding drove me to become a Full Stack Developer. I love building things from scratch, whether it's complex code or a new style. This journey takes me to new paths every day. Welcome to my world!";
            if(backBtn) backBtn.innerHTML = "← Back to Home";
        }
    };
</script>

</body>
</html>
