<script>
    const aboutContent = {
        HI: {
            title: "मेरे बारे में",
            para: "नमस्ते! मैं <b>मंजीत</b> हूँ, एक कुशल <b>Full Stack Developer</b> जिसे इंडस्ट्री में <b>4 साल का अनुभव</b> है। JB Knowledge Park से BCA करने के बाद, मैंने खुद को मॉडर्न वेब टेक्नोलॉजीज और <b>Data Analytics</b> में माहिर बनाया है।<br><br>वर्तमान में, मैं एक कंपनी में फुल स्टैक डेवलपर के रूप में काम कर रहा हूँ। मेरा उद्देश्य तकनीक और डेटा के मेल से आपके बिज़नेस को <b>Next Level</b> पर ले जाना है।",
            btn: "संपर्क करें"
        },
        EN: {
            title: "About Me",
            para: "Hi! I am <b>Manjeet</b>, a professional <b>Full Stack Developer</b> with <b>4 years of experience</b>. After completing my BCA, I specialized in the <b>MERN Stack</b> and <b>Data Analytics</b>.<br><br>Currently working as a Full Stack Developer, I focus on building data-driven applications that drive results. I am passionate about helping businesses <b>Grow</b> through cutting-edge technology. Let’s build something great!",
            btn: "Contact Me"
        }
    };

    function loadAboutContent() {
        let lang = localStorage.getItem("preferredLang") || "HI"; 
        let titleEl = document.getElementById("det-title");
        let paraEl = document.getElementById("det-desc");
        let btnEl = document.getElementById("contact-btn");

        if (titleEl && paraEl) {
            titleEl.innerHTML = aboutContent[lang].title;
            paraEl.innerHTML = aboutContent[lang].para;
            btnEl.innerHTML = aboutContent[lang].btn;
        }
    }

    // ... (बाकी स्क्रिप्ट वही रहेगी)
    function changeLanguage(langCode) {
        localStorage.setItem("preferredLang", langCode);
        loadAboutContent();
    }
    window.addEventListener('DOMContentLoaded', loadAboutContent);
    window.addEventListener('storage', loadAboutContent);
</script>
