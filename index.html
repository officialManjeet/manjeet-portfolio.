            }
        } catch (e) {
            document.getElementById('det-desc').innerText = "Error loading about section.";
        }
    } else {
        // बाकी सारे कार्ड्स के लिए (Trading, Courses, etc.)
        const descKey = id + (lang === 'en' ? 'D' : 'D'); // आपके डिक्शनरी की Key के हिसाब से
        document.getElementById('det-title').innerText = dict[lang][id + 'T'] || id;
        document.getElementById('det-desc').innerText = dict[lang][id + 'D'] || "Details coming soon...";
    }

    window.scrollTo(0, 0);
} // यहाँ showDetail फंक्शन खत्म होता है

 fetch('./all-cards.html') // यहाँ बिंदी (.) और स्लैश (/) लगायें
